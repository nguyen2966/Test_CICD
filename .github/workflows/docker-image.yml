name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-build-e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Install Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # =========================
      # 1️⃣ Integration Test
      # =========================
      - name: Run Integration Tests
        run: npm run test:integration

      # =========================
      # 2️⃣ Build Docker Image
      # =========================
      - name: Build Docker Image
        run: docker build -t myapp .

      # =========================
      # 3️⃣ Run Container
      # =========================
      - name: Start Container
        run: docker run -d -p 3000:3000 --name test-container myapp

      # Đợi server boot
      - name: Wait for app
        run: sleep 5

      # =========================
      # 4️⃣ E2E Test
      # =========================
      - name: Run E2E Tests
        run: npm run test:e2e

      # Cleanup
      - name: Stop Container
        if: always()
        run: docker stop test-container