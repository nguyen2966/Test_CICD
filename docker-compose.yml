version: "3.9"

services:
  db:
    image: postgres:15
    container_name: my-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: my-backend
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://postgres:123456@db:5432/mydb
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  postgres_data: